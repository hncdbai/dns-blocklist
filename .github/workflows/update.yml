name: Update Blocklist

于:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Run script
        run: |
          chmod +x merge.sh
          ./merge.sh

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "update blocklist" || echo "no changes"
          git push
